services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: checkobra_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: checkobra_backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-checkobra}
      DB_USER: ${DB_USER:-checkobra}
      DB_PASSWORD: ${DB_PASSWORD:-checkobra}
    command: sh -c "npm install && npm run dev"

  db:
    image: mysql:8.0
    container_name: checkobra_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-checkobra}
      MYSQL_USER: ${MYSQL_USER:-checkobra}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-checkobra}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-checkobra}", "-p${MYSQL_PASSWORD:-checkobra}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: checkobra_pma
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: ${DB_HOST:-db}
      PMA_PORT: ${DB_PORT:-3306}
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata: